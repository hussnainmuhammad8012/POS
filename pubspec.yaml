name: utility_store_pos
description: A modern desktop POS system for a single-counter utility store.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # SQLite for desktop
  sqflite: ^2.4.0
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0

  # Charts and visualizations
  fl_chart: ^0.70.0

  # UI helpers
  intl: 0.20.2
  google_fonts: ^6.2.1

  # File handling (backup/restore, imports)
  file_picker: ^8.0.3

  # Window controls (optional enhancements for desktop)
  bitsdojo_window: ^0.1.6
  lucide_icons: ^0.257.0
  shared_preferences: ^2.5.4
  sqlite3_flutter_libs: ^0.6.0+eol
  printing: ^5.14.2
  pdf: ^3.11.3
  url_launcher: ^6.3.2
  tray_manager: ^0.5.2
  http: ^1.2.1
  googleapis_auth: ^1.6.0
  barcode_widget: ^2.0.4
  barcode: ^2.2.3

  # Networking for Companion App
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  qr_flutter: ^4.1.0
  screenshot: ^3.0.0
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  pasteboard: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  msix: ^3.16.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fcm/
