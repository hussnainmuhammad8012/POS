name: utility_store_pos
description: A modern desktop POS system for a single-counter utility store.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # SQLite for desktop
  sqflite: ^2.4.0
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0

  # Charts and visualizations
  fl_chart: ^0.70.0

  # UI helpers
  intl: 0.20.2
  google_fonts: ^6.2.1

  # File handling (backup/restore, imports)
  file_picker: ^8.0.3

  # Window controls (optional enhancements for desktop)
  bitsdojo_window: ^0.1.6
  lucide_icons: ^0.257.0
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
